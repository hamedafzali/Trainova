# Development overlay: hot-reloading dev server with the source bind-mounted.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up web-dev
services:
  # Disable the production image in dev.
  trainova:
    profiles: ["prod"]

  web-dev:
    image: node:20-alpine
    container_name: trainova-web-dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_AUTH_ENABLED=${NEXT_PUBLIC_AUTH_ENABLED:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    networks:
      - trainova-network
    stdin_open: true
    tty: true

volumes:
  node_modules:
  next_cache:
