services:
  trainova:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # "1" turns the login screen on in the client (server has a database).
        - NEXT_PUBLIC_AUTH_ENABLED=${NEXT_PUBLIC_AUTH_ENABLED:-1}
        # "1" shows the AI plan generator (set when ANTHROPIC_API_KEY is present).
        - NEXT_PUBLIC_AI_ENABLED=${NEXT_PUBLIC_AI_ENABLED:-}
    container_name: trainova-web
    ports:
      - "5008:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Accounts + sync. Postgres is internal-only (never published / tunneled).
      # POSTGRES_PASSWORD & JWT_SECRET are required — set them in the ACM project
      # variables (ACM detects required vars from this compose and prompts you).
      - DATABASE_URL=postgres://trainova:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in project variables}@trainova-db:5432/trainova
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in project variables}
      # Optional: this email becomes admin on signup/login (set in ACM variables).
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      # Optional: enables AI plan generation (set in ACM variables).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional: SMTP for password-reset emails + public URL for the reset link.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_URL=${APP_URL:-}
    restart: unless-stopped
    depends_on:
      trainova-db:
        condition: service_healthy
    networks:
      - trainova-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  trainova-db:
    image: postgres:16-alpine
    container_name: trainova-db
    environment:
      - POSTGRES_USER=trainova
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in project variables}
      - POSTGRES_DB=trainova
    volumes:
      - trainova-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - trainova-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainova -d trainova"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nightly pg_dump → /backups, keeping the 7 most recent. Tiny, mostly idle.
  trainova-backup:
    image: postgres:16-alpine
    container_name: trainova-backup
    depends_on:
      trainova-db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in project variables}
    volumes:
      - trainova-backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          until pg_isready -h trainova-db -U trainova -d trainova -q; do sleep 2; done;
          ts=$$(date +%Y%m%d-%H%M%S);
          pg_dump -h trainova-db -U trainova -d trainova | gzip > /tmp/dump.gz;
          if [ -s /tmp/dump.gz ]; then
            mv /tmp/dump.gz /backups/trainova-$$ts.sql.gz;
            echo "backup ok: trainova-$$ts.sql.gz";
          else
            echo "backup FAILED at $$ts (empty)"; rm -f /tmp/dump.gz;
          fi;
          ls -1t /backups/*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -f;
          sleep 86400;
        done
    restart: unless-stopped
    networks:
      - trainova-network

volumes:
  trainova-db-data:
  trainova-backups:

networks:
  trainova-network:
    driver: bridge
