services:
  trainova:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # "1" turns the login screen on in the client (server has a database).
        - NEXT_PUBLIC_AUTH_ENABLED=${NEXT_PUBLIC_AUTH_ENABLED:-1}
    container_name: trainova-web
    ports:
      - "5008:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Accounts + sync. Postgres is internal-only (never published / tunneled).
      # POSTGRES_PASSWORD & JWT_SECRET are required — set them in the ACM project
      # variables (ACM detects required vars from this compose and prompts you).
      - DATABASE_URL=postgres://trainova:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in project variables}@trainova-db:5432/trainova
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in project variables}
    restart: unless-stopped
    depends_on:
      trainova-db:
        condition: service_healthy
    networks:
      - trainova-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  trainova-db:
    image: postgres:16-alpine
    container_name: trainova-db
    environment:
      - POSTGRES_USER=trainova
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in project variables}
      - POSTGRES_DB=trainova
    volumes:
      - trainova-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - trainova-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainova -d trainova"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  trainova-db-data:

networks:
  trainova-network:
    driver: bridge
